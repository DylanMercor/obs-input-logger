<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OBS Input Logger — Viewer</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel2: #1f232c;
    --text: #e6e8ec;
    --muted: #8a93a6;
    --accent: #4ea0ff;
    --key: #2a3040;
    --key-active: #4ea0ff;
    --mouse: #7be495;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.4 -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
  header { padding: 10px 14px; background: var(--panel); border-bottom: 1px solid #252b35; display: flex;
    gap: 12px; align-items: center; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: .5px; }
  .filepick { display: inline-flex; gap: 6px; align-items: center; }
  .filepick label { background: var(--panel2); padding: 6px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid #2a3140; }
  .filepick label:hover { border-color: var(--accent); color: var(--accent); }
  .filepick span { color: var(--muted); font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; }
  input[type=file] { display: none; }
  #sync { display: inline-flex; gap: 6px; align-items: center; }
  #sync input { width: 80px; background: var(--panel2); color: var(--text); border: 1px solid #2a3140;
    border-radius: 4px; padding: 4px 6px; font-family: ui-monospace, Menlo, Consolas, monospace; }
  main { display: grid; grid-template-columns: 1fr 380px; gap: 12px; padding: 12px; height: calc(100% - 54px); }
  .videoWrap { position: relative; background: #000; border-radius: 8px; overflow: hidden; min-height: 300px;
    display: flex; align-items: center; justify-content: center; }
  video { max-width: 100%; max-height: 100%; display: block; }
  .hudRight { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
  .panel { background: var(--panel); border-radius: 8px; padding: 10px 12px; border: 1px solid #242a35; }
  .panel h2 { margin: 0 0 8px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px;
    text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  .panel h2 .controls { display: flex; gap: 8px; align-items: center; text-transform: none; letter-spacing: 0; font-weight: 400; }
  .panel h2 input[type=range] { accent-color: var(--mouse); width: 100px; }
  .keyboard { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
  .key { background: var(--key); padding: 6px 0; border-radius: 4px; text-align: center; font-family:
    ui-monospace, Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); border: 1px solid #242a35; }
  .key.active { background: var(--key-active); color: #000; border-color: var(--key-active); font-weight: 700; }
  .mouseArea { position: relative; height: 260px; background: var(--panel2); border-radius: 6px; overflow: hidden; }
  .mouseArea canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .btnRow { display: flex; gap: 6px; margin-top: 8px; font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 11px; }
  .btn { flex: 1; background: var(--key); color: var(--muted); padding: 4px 0; text-align: center;
    border-radius: 4px; border: 1px solid #242a35; }
  .btn.active { background: var(--mouse); color: #000; border-color: var(--mouse); font-weight: 700; }
  .eventLog { flex: 1; min-height: 0; overflow: auto; font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 11px; }
  .eventLog .row { padding: 2px 0; border-bottom: 1px solid #1c2128; color: var(--muted); white-space: nowrap; }
  .eventLog .row.kb { color: #ffd479; }
  .eventLog .row.mb { color: var(--mouse); }
  .eventLog .row.mm { color: #8a93a6; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px 12px; font-family: ui-monospace, Menlo,
    Consolas, monospace; font-size: 11px; margin-top: 8px; }
  .stats div span { color: var(--muted); }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>OBS INPUT LOGGER · VIEWER</h1>
  <div class="filepick">
    <label for="videoInput">🎬 Video</label>
    <input id="videoInput" type="file" accept="video/*">
    <span id="videoName">(none)</span>
  </div>
  <div class="filepick">
    <label for="jsonlInput">📜 Input log (.jsonl)</label>
    <input id="jsonlInput" type="file" accept=".jsonl,.json,application/json,text/plain">
    <span id="jsonlName">(none)</span>
  </div>
  <div id="sync">
    <label for="offset" style="color:var(--muted)">offset (ms)</label>
    <input id="offset" type="number" value="0" step="10">
  </div>
</header>
<main>
  <div class="videoWrap">
    <video id="video" controls playsinline></video>
  </div>
  <aside class="hudRight">
    <section class="panel">
      <h2>Keyboard</h2>
      <div class="keyboard" id="kb"></div>
    </section>
    <section class="panel">
      <h2>
        Mouse
        <span class="controls">
          <label for="zoom" style="color:var(--muted)">zoom</label>
          <input id="zoom" type="range" min="-3" max="1" step="0.1" value="-1" title="Pixels per delta count (log scale)">
          <span id="zoomValue" style="color:var(--muted); min-width: 3em; text-align: right;">0.10×</span>
        </span>
      </h2>
      <div class="mouseArea" id="mouseArea">
        <canvas id="trail"></canvas>
      </div>
      <div class="btnRow">
        <div class="btn" data-btn="mouse_left">L</div>
        <div class="btn" data-btn="mouse_middle">M</div>
        <div class="btn" data-btn="mouse_right">R</div>
        <div class="btn" data-btn="mouse_x1">X1</div>
        <div class="btn" data-btn="mouse_x2">X2</div>
      </div>
      <div class="stats">
        <div><span>dx/s</span> <b id="statDx">0</b></div>
        <div><span>dy/s</span> <b id="statDy">0</b></div>
        <div><span>events/s</span> <b id="statRate">0</b></div>
      </div>
    </section>
    <section class="panel" style="display:flex; flex-direction:column; flex:1; min-height:0;">
      <h2>Recent events</h2>
      <div class="eventLog" id="eventLog"><div class="empty">Load a video and a .jsonl log to begin.</div></div>
    </section>
  </aside>
</main>
<script>
// ---------- state ----------
let events = [];   // sorted by t (µs)
let video = document.getElementById('video');
let offsetInput = document.getElementById('offset');
let eventLog = document.getElementById('eventLog');
let kbEl = document.getElementById('kb');
let statDx = document.getElementById('statDx');
let statDy = document.getElementById('statDy');
let statRate = document.getElementById('statRate');
let zoomEl = document.getElementById('zoom');
let zoomValueEl = document.getElementById('zoomValue');

// Mouse visualization — a canvas-based fading trail anchored at center, with
// spring-decay back to origin so fast flicks don't permanently push the dot
// off the viewport. "zoom" = pixels per HID count, tunable via slider.
let zoom = Math.pow(10, parseFloat(zoomEl.value)); // default 0.1 px / count
const canvas = document.getElementById('trail');
const ctx = canvas.getContext('2d');
let cursorX = 0, cursorY = 0;           // integrated position in pixels, relative to center
let lastDrawPoint = null;                // last point drawn on trail

function resizeCanvas() {
  const r = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.max(1, Math.round(r.width  * dpr));
  canvas.height = Math.max(1, Math.round(r.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
new ResizeObserver(resizeCanvas).observe(document.getElementById('mouseArea'));
resizeCanvas();

zoomEl.addEventListener('input', () => {
  zoom = Math.pow(10, parseFloat(zoomEl.value));
  zoomValueEl.textContent = zoom.toFixed(zoom < 0.1 ? 3 : 2) + '×';
});
zoomValueEl.textContent = zoom.toFixed(2) + '×';

// Build a compact on-screen keyboard (rows mirror a common 60%)
const KB_ROWS = [
  ['escape','1','2','3','4','5','6','7','8','9','0','backspace'],
  ['tab','q','w','e','r','t','y','u','i','o','p','backslash'],
  ['capslock','a','s','d','f','g','h','j','k','l','semicolon','return'],
  ['shift','z','x','c','v','b','n','m','comma','period','slash','shift_r'],
  ['ctrl','win','alt','space','alt_r','win_r','ctrl_r','left','up','down','right','f1']
];
const keyEls = {};
for (const row of KB_ROWS) for (const k of row) {
  const el = document.createElement('div');
  el.className = 'key';
  el.textContent = k.length > 4 ? k.slice(0,3) : k;
  el.title = k;
  kbEl.appendChild(el);
  keyEls[k] = el;
}
const btnEls = {};
document.querySelectorAll('.btn').forEach(b => btnEls[b.dataset.btn] = b);

// ---------- file loading ----------
document.getElementById('videoInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  video.src = URL.createObjectURL(f);
  document.getElementById('videoName').textContent = f.name;
});
document.getElementById('jsonlInput').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  const text = await f.text();
  events = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    try {
      const o = JSON.parse(line);
      // Skip the optional v0.4.0+ header line (has "meta" but no "t").
      if (typeof o.t !== 'number') continue;
      events.push(o);
    } catch {}
  }
  events.sort((a,b) => a.t - b.t);
  document.getElementById('jsonlName').textContent = `${f.name} — ${events.length} events`;
  eventLog.innerHTML = '';
});

// ---------- playback driver ----------

let lastIdx = 0;
let lastTimeUs = -1;
let moveAccumDx = 0, moveAccumDy = 0, eventAccum = 0, moveAccumLast = 0;
const held = new Set();
const recentRows = [];

function videoTimeUs() {
  return Math.round((video.currentTime * 1_000_000) - (parseInt(offsetInput.value||'0',10) * 1000));
}

function findIdxAt(tUs) {
  let lo = 0, hi = events.length;
  while (lo < hi) {
    const m = (lo + hi) >> 1;
    if (events[m].t <= tUs) lo = m + 1; else hi = m;
  }
  return lo;
}

function resetToTime(tUs) {
  held.clear();
  for (const el of Object.values(keyEls)) el.classList.remove('active');
  for (const el of Object.values(btnEls)) el.classList.remove('active');
  // Replay state-changing events up to tUs so key-held display is correct.
  const end = findIdxAt(tUs);
  for (let i = 0; i < end; i++) apply(events[i], /*silent=*/true);
  lastIdx = end;
  cursorX = cursorY = 0;
  lastDrawPoint = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function apply(ev, silent) {
  if (ev.type === 'key' || ev.type === 'button') {
    const el = ev.type === 'key' ? keyEls[ev.vk] : btnEls[ev.vk];
    if (ev.state === 'down') {
      held.add(ev.vk);
      if (el) el.classList.add('active');
    } else {
      held.delete(ev.vk);
      if (el) el.classList.remove('active');
    }
    if (!silent) pushRow(ev);
  } else if (ev.type === 'move') {
    // Integrate deltas (scaled by zoom) into a cursor position. Draw a trail
    // segment from previous point to new point. Clamp position so we never
    // leave the box — but the clamp is generous because zoom keeps magnitudes
    // small enough that normal gameplay stays well inside.
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (w === 0) return;
    cursorX += ev.dx * zoom;
    cursorY += ev.dy * zoom;
    const maxX = w * 0.48, maxY = h * 0.48;
    if (cursorX >  maxX) cursorX =  maxX;
    if (cursorX < -maxX) cursorX = -maxX;
    if (cursorY >  maxY) cursorY =  maxY;
    if (cursorY < -maxY) cursorY = -maxY;

    if (!silent) {
      const px = w/2 + cursorX, py = h/2 + cursorY;
      if (lastDrawPoint) {
        ctx.strokeStyle = 'rgba(123, 228, 149, 0.75)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
        ctx.lineTo(px, py);
        ctx.stroke();
      }
      lastDrawPoint = {x: px, y: py};
    }
    moveAccumDx += ev.dx; moveAccumDy += ev.dy;
  } else if (ev.type === 'wheel') {
    if (!silent) pushRow(ev);
  }
  eventAccum++;
}

function pushRow(ev) {
  const cls = ev.type === 'key' ? 'kb' : (ev.type === 'button' ? 'mb' : 'mm');
  const t = (ev.t / 1_000_000).toFixed(3);
  let msg;
  if (ev.type === 'key')    msg = `${t}s  kb    ${ev.vk} ${ev.state}`;
  else if (ev.type === 'button') msg = `${t}s  mb    ${ev.vk} ${ev.state}`;
  else if (ev.type === 'wheel')  msg = `${t}s  wheel dx=${ev.dx} dy=${ev.dy}`;
  else                           msg = `${t}s  ${ev.type}`;
  const row = document.createElement('div');
  row.className = 'row ' + cls;
  row.textContent = msg;
  eventLog.appendChild(row);
  recentRows.push(row);
  if (recentRows.length > 200) { const old = recentRows.shift(); old.remove(); }
  eventLog.scrollTop = eventLog.scrollHeight;
}

function fadeTrail() {
  // Per-frame fade of the mouse trail canvas — older strokes dim out.
  ctx.globalCompositeOperation = 'destination-in';
  ctx.fillStyle = 'rgba(0,0,0,0.94)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'source-over';

  // Draw crosshair (stable overlay, thin lines at box center).
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w > 0) {
    ctx.strokeStyle = 'rgba(138, 147, 166, 0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
    ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
    ctx.stroke();
  }
  // Draw current dot.
  if (lastDrawPoint) {
    ctx.fillStyle = '#7be495';
    ctx.beginPath();
    ctx.arc(w/2 + cursorX, h/2 + cursorY, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Gentle spring back to center so the dot doesn't park against a wall when
  // the user flicks and stops. About ~1s time constant.
  cursorX *= 0.96;
  cursorY *= 0.96;
}

function frame() {
  if (events.length) {
    const tUs = videoTimeUs();
    if (tUs < lastTimeUs - 50_000) {
      resetToTime(tUs);
    } else {
      const target = findIdxAt(tUs);
      for (let i = lastIdx; i < target; i++) apply(events[i], false);
      lastIdx = target;
    }
    lastTimeUs = tUs;

    if (performance.now() - moveAccumLast > 200) {
      const dt = (performance.now() - moveAccumLast) / 1000;
      statDx.textContent = Math.round(moveAccumDx / dt);
      statDy.textContent = Math.round(moveAccumDy / dt);
      statRate.textContent = Math.round(eventAccum / dt);
      moveAccumDx = moveAccumDy = eventAccum = 0;
      moveAccumLast = performance.now();
    }
  }
  fadeTrail();
  requestAnimationFrame(frame);
}

video.addEventListener('seeking', () => { lastTimeUs = -1; });
video.addEventListener('ratechange', () => { lastTimeUs = -1; });
moveAccumLast = performance.now();
requestAnimationFrame(frame);
</script>
</body>
</html>
